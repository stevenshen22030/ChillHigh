<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>聯絡我們 — 公司名稱</title>
  <meta name="description" content="聯絡公司名稱：填寫表單或使用以下資訊直接聯絡我們。">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="logo" href="./">公司名稱</a>
      <nav class="nav">
        <a href="./">首頁</a>
        <a href="about.html">關於</a>
        <a href="services.html">服務</a>
        <a href="contact.html">聯絡</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="contact-form">
      <div class="container">
        <h1>聯絡我們</h1>
        <p>請填寫下列表單，我們會盡快回覆您。</p>

        <form action="https://formspree.io/f/your-form-id" method="POST">
          <label>姓名<input type="text" name="name" required></label>
          <label>電話<input type="tel" name="phone" required></label>
          <label>Email<input type="email" name="email" required></label>
          <label>地址<input type="text" name="address"></label>
          <label>服務區域<input type="text" name="service_area"></label>
          <label>訊息<textarea name="message" rows="5" required></textarea></label>
          <button type="submit">送出</button>
        </form>

        <h2>其他聯絡方式</h2>
        <p>地址：請替換<br>
           電話：請替換<br>
           E-mail：<a href="mailto:info@example.com">info@example.com</a></p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 公司名稱 • 地址：請替換</p>
    </div>
  </footer>
</body>
</html>
